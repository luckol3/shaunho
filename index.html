<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Image Popup</title>
<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 20px 0; background-color: #ffffff; min-height: 100vh; }
@keyframes intenseVibration {
  0% { transform: translate(2px, 1px) rotate(0deg); }
  50% { transform: translate(-2px, -1px) rotate(2deg); }
  100% { transform: translate(1px, -2px) rotate(-1deg); }
}
.freaky-popup {
  position: fixed; background-color: #ff4d4d; color: #fff; padding: 8px 16px; font-weight: bold;
  border-radius: 4px; z-index: 2000; pointer-events: none; animation: intenseVibration 0.1s infinite;
}
.open-btn {
  position: absolute; top: 360px; right: 25%; padding: 12px 24px; cursor: pointer; z-index: 2010;
}
.modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%;
  background-color: rgba(0, 0, 0, 0.85); justify-content: center; align-items: center; }
.modal:target { display: flex; }
.modal-content { position: relative; max-width: 85%; max-height: 85%; }
.modal-content img { max-width: 100%; max-height: 80vh; border: 4px solid white; }
.close-btn { position: absolute; top: -15px; right: -15px; background: #ff4d4d; color: white;
  text-decoration: none; padding: 6px 10px; border-radius: 50%; border: 2px solid white; }
</style>
</head>
<body>
<a href="#imagePopup"><button class="open-btn" id="triggerBtn">Action</button></a>
<div id="popupContainer"></div>
<div id="imagePopup" class="modal">
  <div class="modal-content">
    <a href="#" class="close-btn">&times;</a>
    <img src="image.jpg" alt="Popup">
  </div>
</div>
<script>
const button = document.getElementById('triggerBtn');
const container = document.getElementById('popupContainer');
// Sound effect using base64 data URI
const alertAudio = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA='); 

button.addEventListener('mouseenter', () => {
  alertAudio.currentTime = 0;
  alertAudio.play().catch(()=>{});
  for (let i = 0; i < 15; i++) {
    const popup = document.createElement('div');
    popup.className = 'freaky-popup';
    popup.innerText = 'Shake!';
    popup.style.top = Math.random() * 80 + 10 + 'vh';
    popup.style.left = Math.random() * 80 + 10 + 'vw';
    container.appendChild(popup);
  }
});
button.addEventListener('mouseleave', () => container.innerHTML = '');
</script>
</body>
</html>
